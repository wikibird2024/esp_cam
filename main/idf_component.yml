## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: '>=4.1.0'

  # 1. Component MDNS từ Espressif Component Registry
  # Tải về phiên bản mới nhất
  espressif/mdns: '*'

  # 2. Component ESP32-CAMERA từ kho lưu trữ Git chính thức
  # Đảm bảo bạn có driver camera cần thiết
  esp32-camera:
    git: https://github.com/espressif/esp32-camera.git
